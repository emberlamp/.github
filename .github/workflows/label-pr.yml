name: Label PRs

on:
  pull_request:
    types: [opened, synchronize]
  workflow_dispatch:

jobs:
  label-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Add labels based on changed files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: labeler.yml

      - name: Add repo-specific label
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          gh label create "repo:$REPO_NAME" --repo "${{ github.repository }}" --force 2>/dev/null || true
          gh pr edit ${{ github.event.pull_request.number }} --add-label "repo:$REPO_NAME" --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
